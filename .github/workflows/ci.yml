name: MAGI CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Syntax check
        run: |
          python -m py_compile \
            api/model_config.py \
            api/pipelines/message_pipeline.py \
            api/pipelines/message_router.py \
            api/domains/judgment_flow.py \
            skills/bridge/melchior_client.py \
            skills/bridge/inference_gateway.py \
            scripts/ops/audit_operational_hardening.py \
            scripts/ops/smoke_test_full.py \
            scripts/ops/run_test_suite.py
      - name: Fast unit tests
        run: |
          python -m pip install -U pip pytest requests python-dotenv
          python scripts/ops/run_test_suite.py --suite ci
