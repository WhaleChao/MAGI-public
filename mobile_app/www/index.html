<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAGI Mobile</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: #f4f6f2;
      color: #17201b;
    }
    main {
      width: min(420px, calc(100% - 32px));
      padding: 24px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 18px 48px rgba(19, 32, 27, 0.12);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }
    p {
      margin: 0;
      color: #647067;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main>
    <h1>MAGI Mobile</h1>
    <p>正在連線到 Tailscale MAGI...</p>
  </main>
</body>
</html>
