<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人網站管理 - MAGI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Sans TC", system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        .topbar {
            background: #111;
            border-bottom: 1px solid #333;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar h1 { font-size: 0.95rem; font-weight: 600; color: #ff6600; }
        .topbar .badge {
            font-size: 0.7rem; padding: 2px 8px;
            background: rgba(9,132,227,0.2); border: 1px solid rgba(9,132,227,0.4);
            border-radius: 4px; color: #0984e3;
        }
        .topbar-actions { display: flex; gap: 8px; align-items: center; }
        .topbar a {
            font-size: 0.8rem; padding: 6px 14px; border-radius: 4px;
            text-decoration: none; border: 1px solid #444;
            background: transparent; color: #ccc; transition: all 0.2s;
        }
        .topbar a:hover { background: #222; border-color: #666; color: white; }
        .topbar .btn-back { color: #ff6600; border-color: rgba(255,102,0,0.3); }
        .topbar .btn-site { color: #0984e3; border-color: rgba(9,132,227,0.3); }
        .admin-frame { width: 100%; height: calc(100vh - 48px); border: none; }
        .status-msg {
            text-align: center; padding: 60px 20px; color: #888; font-size: 0.9rem;
        }
        .status-msg a { color: #0984e3; }
        .status-msg pre {
            background: #1a1a1a; padding: 12px 16px; border-radius: 6px;
            margin: 16px auto; max-width: 500px; text-align: left;
            font-size: 0.85rem; color: #ccc;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="/dashboard" class="btn-back">&larr; 儀表板</a>
            <h1>&#127760; 個人網站管理</h1>
            <span class="badge">whalechao.github.io</span>
        </div>
        <div class="topbar-actions">
            <a href="https://whalechao.github.io" target="_blank" class="btn-site">&#128065; 檢視網站</a>
            <a href="https://github.com/WhaleChao/whalechao.github.io" target="_blank">GitHub Repo</a>
        </div>
    </div>

    <!-- 透過 MAGI 反向代理載入後台（/wa/ → localhost:8088） -->
    <iframe id="adminFrame" class="admin-frame" src="/wa/"></iframe>

    <script>
        // 如果 iframe 載入失敗（503），顯示提示
        const frame = document.getElementById('adminFrame');
        frame.addEventListener('load', () => {
            try {
                const doc = frame.contentDocument;
                if (doc && doc.body && doc.body.textContent.includes('未啟動')) {
                    frame.style.display = 'none';
                    const msg = document.createElement('div');
                    msg.className = 'status-msg';
                    msg.innerHTML = '<p style="color:#ff6600;font-size:1.1rem;">&#9888; 後台伺服器未啟動</p>' +
                        '<p style="margin-top:12px;">後台已整合到 MAGI daemon，下次重啟時會自動啟動。</p>' +
                        '<p style="margin-top:8px;">手動啟動：</p>' +
                        '<pre>cd ~/Desktop/MAGI_v2/whalechao.github.io\npython3 admin/admin_server.py</pre>';
                    document.body.appendChild(msg);
                }
            } catch(e) {} // cross-origin — ignore
        });
    </script>
</body>
</html>
