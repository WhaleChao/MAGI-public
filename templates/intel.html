<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球情報 — MAGI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background: #F5F5F7;
            color: #1D1D1F;
            min-height: 100vh;
        }
        .nav {
            background: rgba(245,245,247,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 52px;
            gap: 20px;
        }
        .nav-title {
            font-size: 1rem;
            font-weight: 600;
            color: #1D1D1F;
        }
        .nav a {
            font-size: 0.875rem;
            color: #007AFF;
            text-decoration: none;
        }
        .nav a:hover { text-decoration: underline; }
        .nav-right {
            margin-left: auto;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .refresh-btn {
            background: #007AFF;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
        }
        .refresh-btn:hover { background: #0066CC; }

        .page-wrap {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 24px 60px;
        }
        .page-header {
            margin-bottom: 28px;
        }
        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .page-header p {
            margin-top: 6px;
            font-size: 0.9rem;
            color: #6E6E73;
        }

        .report-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .report-header {
            padding: 16px 20px;
            border-bottom: 1px solid #F2F2F7;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .report-date {
            font-size: 0.78rem;
            font-weight: 600;
            color: #007AFF;
            background: rgba(0,122,255,0.08);
            padding: 3px 10px;
            border-radius: 20px;
        }
        .report-name {
            font-size: 0.82rem;
            color: #6E6E73;
        }
        .report-latest-badge {
            margin-left: auto;
            font-size: 0.72rem;
            font-weight: 600;
            color: #34C759;
            background: rgba(52,199,89,0.1);
            padding: 3px 10px;
            border-radius: 20px;
        }
        .report-body {
            padding: 20px;
            font-size: 0.875rem;
            line-height: 1.7;
            color: #3A3A3C;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 600px;
            overflow-y: auto;
        }
        .report-body::-webkit-scrollbar { width: 5px; }
        .report-body::-webkit-scrollbar-track { background: transparent; }
        .report-body::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 3px; }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
        .empty-state h2 { font-size: 1.2rem; font-weight: 600; color: #1D1D1F; margin-bottom: 8px; }
        .empty-state p { font-size: 0.9rem; color: #6E6E73; }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="nav-title">🌐 全球情報</span>
        <a href="/dashboard">← 主控台</a>
        <div class="nav-right">
            <span style="font-size:0.78rem;color:#6E6E73;">每 6 小時更新</span>
            <form method="POST" action="/api/skills/run" style="display:inline;">
                <input type="hidden" name="skill" value="worldmonitor-intel">
                <input type="hidden" name="task" value="collect">
                <button type="submit" class="refresh-btn">立即更新</button>
            </form>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="page-header">
            <h1>全球情報摘要</h1>
            <p>由 MAGI Melchior 分析 BBC、NHK、Al Jazeera 等來源的每日情資</p>
        </div>

        {% if reports %}
            {% for report in reports %}
            <div class="report-card">
                <div class="report-header">
                    <span class="report-date">{{ report.date_display }}</span>
                    <span class="report-name">{{ report.name }}</span>
                    {% if loop.first %}
                    <span class="report-latest-badge">最新</span>
                    {% endif %}
                </div>
                <div class="report-body">{{ report.content }}</div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty-state">
                <div class="icon">🌐</div>
                <h2>尚無情報</h2>
                <p>點「立即更新」執行首次情報收集</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
