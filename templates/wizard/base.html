<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAGI Setup Wizard</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3a;
            --accent: #f97316;
            --accent2: #8b5cf6;
            --green: #22c55e;
            --red: #ef4444;
            --text: #e4e4e7;
            --muted: #71717a;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wizard-header {
            width: 100%;
            padding: 24px 0 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, #12121a 0%, #0a0a0f 100%);
        }
        .wizard-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .wizard-header .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Progress bar */
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 20px 0;
            width: 100%;
            max-width: 700px;
        }
        .progress-step {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--muted);
        }
        .progress-step.active { color: var(--accent); font-weight: 600; }
        .progress-step.done { color: var(--green); }
        .progress-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--border);
        }
        .progress-step.active .progress-dot { background: var(--accent); }
        .progress-step.done .progress-dot { background: var(--green); }
        .progress-line {
            width: 24px; height: 2px;
            background: var(--border);
            align-self: center;
        }

        /* Content area */
        .wizard-content {
            width: 100%;
            max-width: 700px;
            padding: 24px 20px 60px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 20px;
            margin-bottom: 12px;
        }
        .card h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--accent);
        }
        .card p { color: var(--muted); line-height: 1.6; margin-bottom: 8px; }

        /* Badges / chips */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-green { background: #22c55e22; color: var(--green); border: 1px solid #22c55e44; }
        .badge-orange { background: #f9731622; color: var(--accent); border: 1px solid #f9731644; }
        .badge-red { background: #ef444422; color: var(--red); border: 1px solid #ef444444; }
        .badge-purple { background: #8b5cf622; color: var(--accent2); border: 1px solid #8b5cf644; }

        /* Hardware spec grid */
        .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .spec-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }
        .spec-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .spec-value { font-size: 18px; font-weight: 600; margin-top: 4px; }

        /* Model cards */
        .model-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .model-info { flex: 1; }
        .model-name { font-weight: 600; font-size: 15px; }
        .model-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }
        .model-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
        .model-actions { display: flex; gap: 8px; align-items: center; }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .form-group .hint {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        input[type="text"], input[type="password"], input[type="number"], select {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            border-color: var(--accent);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #ea580c);
            color: white;
        }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-secondary:hover { border-color: var(--accent); }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .btn-green { background: var(--green); color: white; }
        .btn-disabled { opacity: 0.4; pointer-events: none; }

        .btn-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }

        /* Code block */
        .code-block {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 12px;
            line-height: 1.5;
            overflow-x: auto;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            color: #a1a1aa;
        }

        /* Section divider */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        /* Feedback toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 14px;
            z-index: 1000;
            display: none;
            animation: fadeIn 0.3s;
        }
        .toast.show { display: block; }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Checkbox */
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }

        /* Section toggle */
        details { margin-bottom: 12px; }
        details summary {
            cursor: pointer;
            font-weight: 600;
            padding: 8px 0;
            color: var(--accent);
        }

        /* Hero for welcome */
        .hero {
            text-align: center;
            padding: 40px 20px;
        }
        .hero-logo {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .hero h2 {
            font-size: 32px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { font-size: 16px; color: var(--muted); max-width: 500px; margin: 0 auto; line-height: 1.7; }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 24px;
        }
        .feature-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .feature-icon { font-size: 28px; margin-bottom: 8px; }
        .feature-name { font-weight: 600; font-size: 14px; }
        .feature-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="wizard-header">
        <h1>MAGI Setup Wizard</h1>
        <div class="subtitle">Multi-Agent Governance Infrastructure</div>
    </div>

    {% block progress %}{% endblock %}

    <div class="wizard-content">
        {% block content %}{% endblock %}
    </div>

    <div id="toast" class="toast"></div>

    <script>
    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show ' + (type || '');
        setTimeout(() => t.className = 'toast', 3000);
    }
    async function apiPost(url, data) {
        const resp = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data),
        });
        return resp.json();
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
