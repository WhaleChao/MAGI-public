        <section id="dashboard" class="view active">
            <div class="card">
                <div class="toolbar">
                    <div>
                        <h3>業務概覽</h3>
                        <div class="muted">案件管理系統的業務概覽。</div>
                    </div>
                    <button class="btn" id="dashboardRefreshBtn">重新整理</button>
                </div>
                <div class="muted" id="dashboardWindow">帳務區間載入中...</div>
                <div class="stat-grid" style="margin-top:12px;">
                    <div class="stat-card"><div class="k">進行中案件</div><div class="v" id="dashActiveCases">-</div></div>
                    <div class="stat-card"><div class="k">未結法扶案件</div><div class="v" id="dashLegalAidCases">-</div></div>
                    <div class="stat-card"><div class="k">本期收入</div><div class="v" id="dashRevenue">-</div></div>
                    <div class="stat-card"><div class="k">本期支出</div><div class="v" id="dashExpense">-</div></div>
                    <div class="stat-card"><div class="k">已結一般案件</div><div class="v" id="dashClosedRegular">-</div></div>
                    <div class="stat-card"><div class="k">已結法扶案件</div><div class="v" id="dashClosedLaf">-</div></div>
                </div>
            </div>
            <div class="grid-2">
                <div class="card">
                    <h3>最近更新案件</h3>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>案號</th><th>當事人</th><th>案由</th><th>狀態</th></tr></thead>
                            <tbody id="dashboardCasesBody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="card">
                    <h3>待處理待辦</h3>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>日期</th><th>案號</th><th>類型</th><th>描述</th><th>操作</th></tr></thead>
                            <tbody id="dashboardTodosBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="grid-2">
                <div class="card">
                    <h3>近期行事曆</h3>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>開始</th><th>標題</th><th>案號</th><th>地點</th></tr></thead>
                            <tbody id="dashboardCalendarBody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="card">
                    <h3>最近活動紀錄</h3>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>時間</th><th>動作</th><th>實體</th><th>使用者</th></tr></thead>
                            <tbody id="dashboardActivityBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="card">
                <h3>PDF 產生紀錄</h3>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>時間</th><th>案號</th><th>檔名</th><th>狀態</th><th>錯誤</th></tr></thead>
                        <tbody id="dashboardPdfLogBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
