        <section id="archiveWizard" class="view">
            <div class="card">
                <h3>已結案搬移向導（先預覽再執行）</h3>
                <div class="toolbar">
                    <button class="btn" id="archivePreviewBtn">重新預覽</button>
                    <button class="btn primary" id="archiveExecuteBtn">執行搬移（僅勾選項目）</button>
                    <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox"
                            id="archiveForce">目標已存在時仍覆蓋（慎用）</label>
                </div>
                <div id="archiveSummary" class="muted">尚未預覽</div>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>選取</th>
                                <th>案號</th>
                                <th>當事人</th>
                                <th>狀態</th>
                                <th>來源</th>
                                <th>目標</th>
                                <th>判定</th>
                            </tr>
                        </thead>
                        <tbody id="archiveBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
