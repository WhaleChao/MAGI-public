        <section id="calendar" class="view">
            <div class="card">
                <div class="section-head">
                    <div>
                        <h3>事務所行事曆</h3>
                        <div class="section-note">管理 calendar_events。上方用時間與案號篩選，下方維護單筆事件。</div>
                    </div>
                </div>
                <div class="soft-block">
                    <div class="field-grid cols-4">
                        <div class="field" style="grid-column: span 2;">
                            <label for="calQ">搜尋</label>
                            <input id="calQ" placeholder="標題 / 摘要 / 描述 / 地點 / 案號">
                        </div>
                        <div class="field">
                            <label for="calCaseNumber">案件編號</label>
                            <input id="calCaseNumber" placeholder="選填">
                        </div>
                        <div class="field">
                            <label>操作</label>
                            <div class="inline-actions">
                                <button class="btn" id="calSearchBtn">搜尋</button>
                                <button class="btn" id="calRefreshBtn">重新整理</button>
                            </div>
                        </div>
                        <div class="field">
                            <label for="calStartDate">起始時間（含）</label>
                            <input id="calStartDate" type="datetime-local" placeholder="start">
                        </div>
                        <div class="field">
                            <label for="calEndDate">結束時間（含）</label>
                            <input id="calEndDate" type="datetime-local" placeholder="end">
                        </div>
                    </div>
                </div>
                <div class="soft-block">
                    <div class="field-grid cols-4">
                        <div class="field">
                            <label for="cal_id">ID</label>
                            <input id="cal_id" placeholder="更新時使用">
                        </div>
                        <div class="field">
                            <label for="cal_event_id">Event ID</label>
                            <input id="cal_event_id" placeholder="留空自動產生">
                        </div>
                        <div class="field">
                            <label for="cal_title">標題</label>
                            <input id="cal_title" placeholder="必填">
                        </div>
                        <div class="field">
                            <label for="cal_case_number">案件編號</label>
                            <input id="cal_case_number" placeholder="案件編號（選填）">
                        </div>
                        <div class="field">
                            <label for="cal_start_date">開始</label>
                            <input id="cal_start_date" type="datetime-local" placeholder="開始時間">
                        </div>
                        <div class="field">
                            <label for="cal_end_date">結束</label>
                            <input id="cal_end_date" type="datetime-local" placeholder="結束時間（選填）">
                        </div>
                        <div class="field">
                            <label for="cal_location">地點</label>
                            <input id="cal_location" placeholder="地點（選填）">
                        </div>
                        <div class="field">
                            <label for="cal_color">色碼</label>
                            <input id="cal_color" placeholder="#3498db">
                        </div>
                        <div class="field">
                            <label for="cal_is_all_day">全日</label>
                            <input id="cal_is_all_day" placeholder="0/1">
                        </div>
                        <div class="field">
                            <label for="cal_reminder_minutes">提醒分鐘</label>
                            <input id="cal_reminder_minutes" type="number" placeholder="minutes">
                        </div>
                        <div class="field" style="grid-column: span 2;">
                            <label for="cal_summary">摘要</label>
                            <input id="cal_summary" placeholder="summary">
                        </div>
                    </div>
                    <div class="field" style="margin-top:10px;">
                        <label for="cal_description">描述</label>
                        <textarea id="cal_description" placeholder="description"></textarea>
                    </div>
                    <div class="field" style="margin-top:10px;">
                        <label for="cal_raw_data">原始資料</label>
                        <textarea id="cal_raw_data" placeholder="raw_data（JSON 或文字）"></textarea>
                    </div>
                </div>
                <div class="toolbar">
                    <button class="btn primary" id="calSaveBtn">儲存事件</button>
                    <button class="btn warn" id="calResetBtn">清空表單</button>
                </div>
            </div>
            <div class="card" id="calViewCard">
                <div class="cal-toolbar">
                    <button class="cal-today-btn" id="calTodayBtn">今天</button>
                    <div class="cal-nav">
                        <button id="calPrevBtn">◀</button>
                        <button id="calNextBtn">▶</button>
                    </div>
                    <span class="cal-title" id="calViewTitle"></span>
                    <div class="cal-views">
                        <button data-view="day">日</button>
                        <button data-view="week">週</button>
                        <button data-view="month" class="active">月</button>
                    </div>
                </div>
                <div id="calGrid"></div>
            </div>
            <!-- Fallback table (hidden, kept for data operations) -->
            <div class="card" style="display:none;">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th data-sort="start_date" data-type="date">開始</th>
                                <th data-sort="end_date" data-type="date">結束</th>
                                <th data-sort="title">標題</th>
                                <th data-sort="case_number">案號</th>
                                <th data-sort="location">地點</th>
                                <th data-sort="is_all_day">全日</th>
                                <th data-sort="reminder_minutes" data-type="number">提醒</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="calBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
