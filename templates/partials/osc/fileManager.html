<section id="fileManager" class="view">
    <div class="card">
        <div class="section-head">
            <div>
                <h3>📁 NAS 檔案總管</h3>
                <div class="section-note">在瀏覽器內巡覽 NAS 案件資料夾，支援拖放上傳、全檔類預覽、下載、新建資料夾。</div>
            </div>
        </div>
        <div class="soft-block">
            <div class="field-grid cols-3" style="align-items:end;">
                <div class="field" style="grid-column: span 2;">
                    <label for="fmBasePathInput">NAS 案件資料夾路徑</label>
                    <input id="fmBasePathInput" placeholder="Z:\lumi63181107\01_案件\... 或 /Users/ai/SynologyDrive/...">
                </div>
                <div class="field">
                    <label>&nbsp;</label>
                    <div class="inline-actions">
                        <button class="btn" id="fmBasePathGoBtn">開啟</button>
                        <button class="btn" id="fmRefreshBtn">重新整理</button>
                    </div>
                </div>
            </div>
            <div class="fm-toolbar">
                <div class="fm-toolbar-group" role="group" aria-label="檢視模式">
                    <button class="btn-mini fm-view-btn active" data-view="detail" title="詳細檢視">📋 詳細</button>
                    <button class="btn-mini fm-view-btn" data-view="grid" title="網格檢視">🔲 網格</button>
                    <button class="btn-mini fm-view-btn" data-view="compact" title="清單檢視">≡ 清單</button>
                </div>
                <div class="fm-toolbar-group">
                    <label for="fmSortSelect" class="fm-toolbar-label">排序：</label>
                    <select id="fmSortSelect" class="fm-mini-select">
                        <option value="mtime_desc">修改日新→舊</option>
                        <option value="mtime_asc">修改日舊→新</option>
                        <option value="name_asc">名稱 A→Z</option>
                        <option value="name_desc">名稱 Z→A</option>
                        <option value="size_desc">大小大→小</option>
                        <option value="size_asc">大小小→大</option>
                        <option value="type_group">類型分組</option>
                    </select>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="fmShowHiddenToggle">
                    顯示暫存檔
                </label>
                <div class="fm-toolbar-spacer"></div>
                <div class="fm-toolbar-group">
                    <button class="btn-mini" id="fmMkdirBtn" title="新增資料夾">＋ 資料夾</button>
                    <button class="btn-mini" id="fmUploadBtn" title="上傳檔案">⬆ 上傳</button>
                    <button class="btn-mini" id="fmUploadFolderBtn" title="上傳資料夾">⬆ 資料夾</button>
                </div>
            </div>
        </div>

        <div id="fmStatus" class="fm-status" style="display:none;"></div>

        <!-- hidden file inputs (Phase 2 commit 9) -->
        <input type="file" id="fmFileInput" multiple style="display:none;">
        <input type="file" id="fmFolderInput" webkitdirectory directory multiple style="display:none;">

        <!-- Upload queue panel (Phase 2 commit 9, floating bottom-right) -->
        <div id="fmUploadQueue" class="fm-upload-queue" style="display:none;">
            <div class="fm-queue-head">
                <span class="fm-queue-title">上傳佇列</span>
                <button class="fm-queue-close" id="fmUploadQueueClose" title="關閉">✕</button>
            </div>
            <div id="fmUploadQueueBody" class="fm-queue-body"></div>
        </div>

        <!-- Conflict dialog (Phase 2 commit 9) -->
        <div id="fmConflictModal" class="fm-modal" hidden>
            <div class="fm-modal-backdrop"></div>
            <div class="fm-modal-dialog small" role="dialog" aria-labelledby="fmConflictTitle">
                <div class="fm-modal-head">
                    <span id="fmConflictTitle" class="fm-modal-title">檔案已存在</span>
                </div>
                <div class="fm-modal-body padded">
                    <div id="fmConflictBody" style="font-size:13px; line-height:1.5;"></div>
                </div>
                <div class="fm-modal-foot">
                    <button class="btn-mini" data-conflict-act="skip">略過</button>
                    <button class="btn-mini" data-conflict-act="rename">重命名</button>
                    <button class="btn-mini" data-conflict-act="overwrite">覆蓋</button>
                    <button class="btn-mini" data-conflict-act="skip-all">全部略過</button>
                    <button class="btn-mini primary" data-conflict-act="overwrite-all">全部覆蓋</button>
                </div>
            </div>
        </div>

        <!-- Context menu (Phase 2 commit 11) -->
        <ul id="fmContextMenu" class="fm-context-menu" hidden></ul>

        <!-- Preview modal (Phase 2 commit 8) -->
        <div id="fmPreviewModal" class="fm-modal" hidden>
            <div class="fm-modal-backdrop"></div>
            <div class="fm-modal-dialog" role="dialog" aria-labelledby="fmPreviewTitle">
                <div class="fm-modal-head">
                    <span id="fmPreviewTitle" class="fm-modal-title">預覽</span>
                    <span class="fm-modal-spacer"></span>
                    <a id="fmPreviewDownload" class="btn-mini" download>⬇ 下載</a>
                    <button class="fm-modal-close" id="fmPreviewClose" title="關閉 (Esc)">✕</button>
                </div>
                <div id="fmPreviewBody" class="fm-modal-body">
                    <div class="fm-empty">載入中…</div>
                </div>
            </div>
        </div>

        <div class="fm-shell">
            <div class="fm-sidebar" id="fmTree">
                <div class="fm-empty">尚未開啟資料夾</div>
            </div>
            <div class="fm-main">
                <div id="fmBreadcrumb" class="fm-breadcrumb">
                    <span class="crumb current" data-rel="">尚未開啟</span>
                </div>
                <div id="fmDropZone" class="fm-dropzone" style="display:none;">
                    <div class="fm-dropzone-inner">
                        <div class="fm-dropzone-icon">⬇</div>
                        <div>放開以上傳到目前資料夾</div>
                    </div>
                </div>
                <div id="fmEntriesArea">
                    <div class="fm-empty">輸入 NAS 路徑後按「開啟」</div>
                </div>
            </div>
        </div>
    </div>
</section>
