<section id="fileManager" class="view">
    <div class="card">
        <div class="section-head">
            <div>
                <h3>📁 NAS 檔案總管</h3>
                <div class="section-note">在瀏覽器內巡覽 NAS 案件資料夾。Phase 1 — 純檢視；上傳、預覽、拖放於 Phase 2 加入。</div>
            </div>
        </div>
        <div class="soft-block">
            <div class="field-grid cols-3" style="align-items:end;">
                <div class="field" style="grid-column: span 2;">
                    <label for="fmBasePathInput">NAS 案件資料夾路徑</label>
                    <input id="fmBasePathInput" placeholder="Z:\lumi63181107\01_案件\... 或 /Users/ai/SynologyDrive/...">
                </div>
                <div class="field">
                    <label>&nbsp;</label>
                    <div class="inline-actions">
                        <button class="btn" id="fmBasePathGoBtn">開啟</button>
                        <button class="btn" id="fmRefreshBtn">重新整理</button>
                    </div>
                </div>
            </div>
            <div class="fm-toolbar">
                <div class="fm-toolbar-group" role="group" aria-label="檢視模式">
                    <button class="btn-mini fm-view-btn active" data-view="detail" title="詳細檢視">📋 詳細</button>
                    <button class="btn-mini fm-view-btn" data-view="grid" title="網格檢視">🔲 網格</button>
                    <button class="btn-mini fm-view-btn" data-view="compact" title="清單檢視">≡ 清單</button>
                </div>
                <div class="fm-toolbar-group">
                    <label for="fmSortSelect" class="fm-toolbar-label">排序：</label>
                    <select id="fmSortSelect" class="fm-mini-select">
                        <option value="mtime_desc">修改日新→舊</option>
                        <option value="mtime_asc">修改日舊→新</option>
                        <option value="name_asc">名稱 A→Z</option>
                        <option value="name_desc">名稱 Z→A</option>
                        <option value="size_desc">大小大→小</option>
                        <option value="size_asc">大小小→大</option>
                        <option value="type_group">類型分組</option>
                    </select>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="fmShowHiddenToggle">
                    顯示暫存檔
                </label>
            </div>
        </div>

        <div id="fmStatus" class="fm-status" style="display:none;"></div>

        <div class="fm-shell">
            <div class="fm-sidebar" id="fmTree">
                <div class="fm-empty">尚未開啟資料夾</div>
            </div>
            <div class="fm-main">
                <div id="fmBreadcrumb" class="fm-breadcrumb">
                    <span class="crumb current" data-rel="">尚未開啟</span>
                </div>
                <div id="fmEntriesArea">
                    <div class="fm-empty">輸入 NAS 路徑後按「開啟」</div>
                </div>
            </div>
        </div>
    </div>
</section>
